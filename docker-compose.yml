# FactoryOS Enterprise — development environment.
# Runtime dependencies (PostgreSQL, RabbitMQ, Redis, MinIO) plus the API.
# Production deployment is defined separately under deploy/ (Constitution rule 9: dev/prod separated).

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: factoryos
      POSTGRES_PASSWORD: factoryos_dev
      POSTGRES_DB: factoryos
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factoryos"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: factoryos
      RABBITMQ_DEFAULT_PASS: factoryos_dev
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: factoryos
      MINIO_ROOT_PASSWORD: factoryos_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=factoryos;Username=factoryos;Password=factoryos_dev"
      MessageBus__Host: "rabbitmq"
      Redis__Configuration: "redis:6379"
      Storage__Endpoint: "minio:9000"
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  minio-data:
